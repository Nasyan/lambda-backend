[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.venv
  | venv
  | \.git
  | __pycache__
  | \.env
  | \.example
  | alembic.ini
  | README\.md
  | requirements\.txt
  | migrations
  | .*_migrations
  | alembic
)/
'''

[tool.pytest.ini_options]
asyncio_mode = "auto"
# task3 ГЗ-3: session-scoped движки требуют общей event-петли с тестами
asyncio_default_fixture_loop_scope = "session"